version: '3.8'

services:
  geoscan-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geoscan-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-sua_chave_secreta_aqui}
      - CORS_ORIGIN=http://localhost
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Add MongoDB for future database integration
  # mongodb:
