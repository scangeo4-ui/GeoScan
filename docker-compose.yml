  #     - mongo_data:/data/db
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: root
  #     MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}

volumes:
  # mongo_data:
  logs: