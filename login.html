<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO-SCAN | Autenticação de Sistema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #f39c12;
            --secondary: #3498db;
            --accent: #00f2ff;
            --bg-dark: #06090f;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        /* Fundo Tecnológico Animado */
        .tech-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(6, 9, 15, 0.55), rgba(6, 9, 15, 0.65)), 
                        url('https://images.unsplash.com/photo-1580137189272-c9379f8864fd?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Efeito de Grade Cibernética */
        .tech-bg::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Card de Login (Glassmorphism) */
        .login-card {
            background: rgba(15, 20, 25, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 
                        inset 0 0 20px rgba(243, 156, 18, 0.05);
            position: relative;
            z-index: 10;
            animation: fadeInCard 0.8s ease-out;
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo e Título */
        .header { text-align: center; margin-bottom: 40px; }
        
        .header .logo-icon {
            font-size: 45px;
            color: var(--primary);
            filter: drop-shadow(0 0 15px rgba(243, 156, 18, 0.4));
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(243, 156, 18, 0.4)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(243, 156, 18, 0.7)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(243, 156, 18, 0.4)); }
        }

        .header h1 { font-size: 28px; letter-spacing: 2px; font-weight: 800; }
        .header h1 span { color: var(--primary); }
        .header p { color: #888; font-size: 13px; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

        /* Inputs Estilizados */
        .input-box { position: relative; margin-bottom: 25px; }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            transition: 0.3s;
        }

        .input-box input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-box input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.2);
        }

        .input-box input:focus + i { color: var(--primary); }

        /* Botão Futurista */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #e67e22;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.3);
        }

        /* Footer do Card */
        .card-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scan 3s linear infinite;
            opacity: 0.5;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .login-card { padding: 40px 25px; margin: 20px; }
        }
    </style>
</head>
<body>

    <div class="tech-bg"></div>

    <div class="login-card">
        <div class="scan-line"></div>
        
        <div class="header">
            <div class="logo-icon"><i class="fas fa-satellite-dish"></i></div>
            <h1>GEO<span>SCAN</span></h1>
            <p>Acesso ao Terminal de Monitoramento</p>
        </div>

        <!-- Mensagem de Erro (opcional, para melhor UX) -->
        <div id="errorMessage" style="background: rgba(231, 76, 60, 0.2); border-left: 3px solid #e74c3c; padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; color: #ff9999; font-size: 13px; display: none;">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
        </div>

        <form id="loginForm" onsubmit="handleLoginSubmit(event);">
            <div class="input-box">
                <i class="fas fa-user-shield"></i>
                <input type="text" id="username" placeholder="Identificação do Operador" required>
            </div>

            <div class="input-box">
                <i class="fas fa-key"></i>
                <input type="password" id="password" placeholder="Chave de Segurança" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span>Entrar no Sistema</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="card-footer">
            <p><i class="fas fa-microchip"></i> Encriptação Ativa | Protocolo 2026</p>
            <a href="index.html" style="display: inline-block; margin-top: 10px; color: #f39c12; text-decoration: none; font-size: 12px; transition: color 0.3s;">← Voltar</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Manipulador de submissão do formulário com feedback visual
        function handleLoginSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('loginBtn');
            const originalContent = btn.innerHTML;
            
            // Mostrar loading
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';
            btn.disabled = true;
            
            // Chamar a função fazerLogin() do auth.js
            setTimeout(() => {
                fazerLogin();
                // Se falhar, restaurar o botão após 1.5s
                setTimeout(() => {
                    if (window.location.pathname.includes('login')) {
                        btn.innerHTML = originalContent;
                        btn.disabled = false;
                    }
                }, 1500);
            }, 500);
        }
    </script>
</body>
</html>
